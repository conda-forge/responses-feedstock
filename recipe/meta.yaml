{% set name = "responses" %}
{% set version = "0.25.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 9374d047a575c8f781b94454db5cab590b6029505f488d12899ddb10a4af1cf4

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - pyyaml
    - python >={{ python_min }}
    - requests >=2.30.0,<3.0
    - types-pyyaml
    - typing_extensions
    - urllib3 >=1.25.10,<3.0
test:
  imports:
    - responses
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/getsentry/responses
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: A utility library for mocking out the `requests` Python library.

extra:
  recipe-maintainers:
    - thewchan
    - mariusvniekerk
